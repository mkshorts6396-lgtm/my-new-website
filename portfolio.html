<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="stylesheet" href="index.css">
<title>Portfolio</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e1b4b);
min-height:100vh;
color:white;
padding:50px;
}

h1{
text-align:center;
font-size:55px;
margin-bottom:50px;
}

.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
}

.project{
height:250px;
border-radius:25px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
font-weight:bold;
transition:.5s;
transform-style:preserve-3d;
}

.project:hover{
transform:rotateY(12deg) rotateX(8deg) scale(1.05);
}
.navbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
    background:rgba(0,0,0,0.2);
    backdrop-filter:blur(10px);
    z-index:1000;
}

.nav-links a{
    color:white;
    text-decoration:none;
    margin-left:25px;
}

body{
    padding-top:90px; 
}
</style>
</head>
<body>
   <nav class="navbar">
    <div class="logo">NEXUS</div>

    <div class="nav-links">
        <a href="myweb.html">Home</a>
        <a href="service.html">Services</a>
        
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<h1>Our Projects</h1>

<div class="projects">
<div class="project">AI Platform</div>
<div class="project">E-Commerce</div>
<div class="project">Mobile App</div>
<div class="project">Dashboard UI</div>
<div class="project">Portfolio Site</div>
<div class="project">Startup Landing Page</div>
</div>
<script src="index.js"></script>

</body>
</html>
